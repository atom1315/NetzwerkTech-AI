<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 380">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1320"/><stop offset="100%" style="stop-color:#181e33"/>
    </linearGradient>
    <linearGradient id="bar1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#7b2ff7"/>
    </linearGradient>
    <linearGradient id="bar2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#4b5563"/><stop offset="100%" style="stop-color:#6b7280"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="1" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="750" height="380" fill="url(#bg)" rx="10"/>
  <text x="375" y="30" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Performance-Benchmarks: NetzwerkTech AI vs. Traditionell</text>

  <!-- Chart 1: F1-Score -->
  <text x="40" y="65" font-family="sans-serif" font-size="11" font-weight="600" fill="#00d4ff">Anomalie-Erkennung (F1-Score %)</text>
  <!-- NetzwerkTech -->
  <rect x="170" y="75" width="385" height="16" rx="3" fill="url(#bar1)" filter="url(#g)"/>
  <text x="160" y="87" text-anchor="end" font-family="monospace" font-size="9" fill="#e2e8f0">NetzwerkTech AI</text>
  <text x="562" y="87" font-family="monospace" font-size="9" fill="#00d4ff" font-weight="700">96.2%</text>
  <!-- Snort -->
  <rect x="170" y="96" width="290" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="107" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Snort IDS</text>
  <text x="467" y="107" font-family="monospace" font-size="9" fill="#8892b0">72.4%</text>
  <!-- Suricata -->
  <rect x="170" y="115" width="307" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="126" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Suricata</text>
  <text x="484" y="126" font-family="monospace" font-size="9" fill="#8892b0">76.8%</text>
  <!-- Zeek -->
  <rect x="170" y="134" width="277" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="145" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Zeek</text>
  <text x="454" y="145" font-family="monospace" font-size="9" fill="#8892b0">69.3%</text>

  <!-- Chart 2: Latency -->
  <text x="40" y="180" font-family="sans-serif" font-size="11" font-weight="600" fill="#00ff88">Latenz (ms) — niedriger = besser</text>
  <rect x="170" y="190" width="48" height="16" rx="3" fill="#00ff88" filter="url(#g)"/>
  <text x="160" y="202" text-anchor="end" font-family="monospace" font-size="9" fill="#e2e8f0">NetzwerkTech AI</text>
  <text x="225" y="202" font-family="monospace" font-size="9" fill="#00ff88" font-weight="700">12ms</text>
  <rect x="170" y="211" width="180" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="222" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Snort IDS</text>
  <text x="357" y="222" font-family="monospace" font-size="9" fill="#8892b0">45ms</text>
  <rect x="170" y="230" width="152" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="241" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Suricata</text>
  <text x="329" y="241" font-family="monospace" font-size="9" fill="#8892b0">38ms</text>
  <rect x="170" y="249" width="268" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="260" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Zeek</text>
  <text x="445" y="260" font-family="monospace" font-size="9" fill="#8892b0">67ms</text>

  <!-- Chart 3: Throughput -->
  <text x="40" y="295" font-family="sans-serif" font-size="11" font-weight="600" fill="#fbbf24">Durchsatz (Gbps)</text>
  <rect x="170" y="305" width="320" height="16" rx="3" fill="#fbbf24" filter="url(#g)"/>
  <text x="160" y="317" text-anchor="end" font-family="monospace" font-size="9" fill="#e2e8f0">NetzwerkTech AI</text>
  <text x="497" y="317" font-family="monospace" font-size="9" fill="#fbbf24" font-weight="700">40 Gbps</text>
  <rect x="170" y="326" width="96" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="337" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Snort IDS</text>
  <text x="273" y="337" font-family="monospace" font-size="9" fill="#8892b0">12 Gbps</text>
  <rect x="170" y="345" width="176" height="14" rx="3" fill="url(#bar2)"/>
  <text x="160" y="356" text-anchor="end" font-family="monospace" font-size="9" fill="#8892b0">Suricata</text>
  <text x="353" y="356" font-family="monospace" font-size="9" fill="#8892b0">22 Gbps</text>
</svg>
