<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 750 400">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1729"/><stop offset="100%" style="stop-color:#1a2340"/>
    </linearGradient>
    <linearGradient id="card1" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f"/><stop offset="100%" style="stop-color:#162d4a"/>
    </linearGradient>
    <linearGradient id="accent1" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00d4ff"/><stop offset="100%" style="stop-color:#0090ff"/>
    </linearGradient>
    <linearGradient id="accent2" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#7b2ff7"/><stop offset="100%" style="stop-color:#c850c0"/>
    </linearGradient>
    <linearGradient id="accent3" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00ff88"/><stop offset="100%" style="stop-color:#00cc6a"/>
    </linearGradient>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="4" flood-color="#000" flood-opacity="0.3"/></filter>
    <filter id="glow"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
  </defs>
  <rect width="750" height="400" fill="url(#bg)" rx="12"/>
  <text x="375" y="35" text-anchor="middle" font-family="sans-serif" font-size="18" font-weight="700" fill="#e2e8f0">Systemübersicht — NetzwerkTech AI</text>
  
  <!-- Data Sources -->
  <g filter="url(#shadow)">
    <rect x="20" y="60" width="160" height="130" rx="8" fill="url(#card1)" stroke="#00d4ff" stroke-width="1" opacity="0.9"/>
    <rect x="20" y="60" width="160" height="4" rx="2" fill="url(#accent1)"/>
    <text x="100" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#00d4ff">📡 Datenquellen</text>
    <text x="40" y="110" font-family="monospace" font-size="10" fill="#8892b0">• Packet Capture</text>
    <text x="40" y="128" font-family="monospace" font-size="10" fill="#8892b0">• NetFlow/sFlow</text>
    <text x="40" y="146" font-family="monospace" font-size="10" fill="#8892b0">• SNMP Polling</text>
    <text x="40" y="164" font-family="monospace" font-size="10" fill="#8892b0">• Syslog Events</text>
    <text x="40" y="182" font-family="monospace" font-size="10" fill="#8892b0">• API Telemetrie</text>
  </g>

  <!-- AI Engine -->
  <g filter="url(#shadow)">
    <rect x="245" y="55" width="260" height="180" rx="8" fill="url(#card1)" stroke="#7b2ff7" stroke-width="1.5" opacity="0.95"/>
    <rect x="245" y="55" width="260" height="4" rx="2" fill="url(#accent2)"/>
    <text x="375" y="80" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="700" fill="#c850c0">🧠 KI-Engine</text>
    <!-- Sub-modules -->
    <rect x="260" y="95" width="105" height="30" rx="5" fill="#2a1f5e" stroke="#7b2ff7" stroke-width="0.5"/>
    <text x="312" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d4b8ff">Anomaly Det.</text>
    <rect x="380" y="95" width="105" height="30" rx="5" fill="#2a1f5e" stroke="#7b2ff7" stroke-width="0.5"/>
    <text x="432" y="114" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d4b8ff">Traffic Anal.</text>
    <rect x="260" y="135" width="105" height="30" rx="5" fill="#2a1f5e" stroke="#7b2ff7" stroke-width="0.5"/>
    <text x="312" y="154" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d4b8ff">IDS/IPS</text>
    <rect x="380" y="135" width="105" height="30" rx="5" fill="#2a1f5e" stroke="#7b2ff7" stroke-width="0.5"/>
    <text x="432" y="154" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#d4b8ff">Prediction</text>
    <rect x="260" y="175" width="225" height="30" rx="5" fill="#1a3a2a" stroke="#00ff88" stroke-width="0.5"/>
    <text x="372" y="194" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#00ff88">RL Auto-Optimizer</text>
    <text x="375" y="225" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#5a6080">TensorFlow • PyTorch • ONNX Runtime</text>
  </g>

  <!-- Output -->
  <g filter="url(#shadow)">
    <rect x="570" y="60" width="160" height="130" rx="8" fill="url(#card1)" stroke="#00ff88" stroke-width="1" opacity="0.9"/>
    <rect x="570" y="60" width="160" height="4" rx="2" fill="url(#accent3)"/>
    <text x="650" y="85" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#00ff88">📊 Ausgaben</text>
    <text x="590" y="110" font-family="monospace" font-size="10" fill="#8892b0">• Dashboard</text>
    <text x="590" y="128" font-family="monospace" font-size="10" fill="#8892b0">• Alerts & Tickets</text>
    <text x="590" y="146" font-family="monospace" font-size="10" fill="#8892b0">• Reports (PDF)</text>
    <text x="590" y="164" font-family="monospace" font-size="10" fill="#8892b0">• API Responses</text>
    <text x="590" y="182" font-family="monospace" font-size="10" fill="#8892b0">• Auto-Remediation</text>
  </g>

  <!-- Arrows -->
  <g filter="url(#glow)">
    <line x1="180" y1="125" x2="245" y2="125" stroke="#00d4ff" stroke-width="2" marker-end="url(#arrowBlue)"/>
    <line x1="505" y1="125" x2="570" y2="125" stroke="#00ff88" stroke-width="2"/>
    <polygon points="567,120 577,125 567,130" fill="#00ff88"/>
    <polygon points="242,120 252,125 242,130" fill="#00d4ff"/>
  </g>

  <!-- Data Layer -->
  <g filter="url(#shadow)">
    <rect x="150" y="280" width="450" height="90" rx="8" fill="url(#card1)" stroke="#ffd93d" stroke-width="1" opacity="0.9"/>
    <rect x="150" y="280" width="450" height="4" rx="2" fill="#ffd93d"/>
    <text x="375" y="305" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#ffd93d">💾 Datenschicht</text>
    <rect x="170" y="315" width="120" height="35" rx="5" fill="#2a2a1a" stroke="#ffd93d" stroke-width="0.5"/>
    <text x="230" y="337" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ffd93d">TimescaleDB</text>
    <rect x="310" y="315" width="120" height="35" rx="5" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="0.5"/>
    <text x="370" y="337" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#ff6b6b">Redis Cache</text>
    <rect x="450" y="315" width="130" height="35" rx="5" fill="#1a2a2a" stroke="#00d4ff" stroke-width="0.5"/>
    <text x="515" y="337" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#00d4ff">Apache Kafka</text>
  </g>

  <!-- Vertical connectors -->
  <line x1="375" y1="235" x2="375" y2="280" stroke="#5a6080" stroke-width="1.5" stroke-dasharray="4,3"/>
</svg>
