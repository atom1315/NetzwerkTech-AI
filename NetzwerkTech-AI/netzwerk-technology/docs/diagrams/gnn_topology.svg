<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 700 300">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f1320"/><stop offset="100%" style="stop-color:#181e33"/>
    </linearGradient>
    <filter id="g"><feGaussianBlur stdDeviation="2" result="b"/><feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <filter id="s"><feDropShadow dx="0" dy="1" stdDeviation="2" flood-color="#000" flood-opacity="0.3"/></filter>
  </defs>
  <rect width="700" height="300" fill="url(#bg)" rx="10"/>
  <text x="350" y="28" text-anchor="middle" font-family="sans-serif" font-size="14" font-weight="700" fill="#e2e8f0">Graph Neural Network — Netzwerk-Topologie-Analyse</text>

  <!-- Network Graph (left) -->
  <g filter="url(#g)">
    <!-- Edges -->
    <line x1="100" y1="100" x2="170" y2="70" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="100" x2="60" y2="160" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="100" y1="100" x2="170" y2="140" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="70" x2="170" y2="140" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="60" y1="160" x2="130" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="140" x2="130" y2="200" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="70" x2="230" y2="110" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <line x1="170" y1="140" x2="230" y2="110" stroke="#00d4ff" stroke-width="1" opacity="0.5"/>
    <!-- Nodes -->
    <circle cx="100" cy="100" r="12" fill="#1e3a5f" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="100" y="104" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00d4ff">R1</text>
    <circle cx="170" cy="70" r="10" fill="#1e3a5f" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="170" y="74" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00d4ff">S1</text>
    <circle cx="60" cy="160" r="10" fill="#1e3a5f" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="60" y="164" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00d4ff">S2</text>
    <circle cx="170" cy="140" r="10" fill="#1e3a5f" stroke="#00d4ff" stroke-width="1.5"/>
    <text x="170" y="144" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#00d4ff">S3</text>
    <circle cx="130" cy="200" r="10" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
    <text x="130" y="204" text-anchor="middle" font-family="sans-serif" font-size="8" fill="#ff6b6b">S4</text>
    <circle cx="230" cy="110" r="8" fill="#1a2a1a" stroke="#00ff88" stroke-width="1.5"/>
    <text x="230" y="114" text-anchor="middle" font-family="sans-serif" font-size="7" fill="#00ff88">FW</text>
  </g>
  <text x="140" y="245" text-anchor="middle" font-family="sans-serif" font-size="10" fill="#5a6080">Netzwerk-Graph G(V, E)</text>
  <text x="130" y="260" text-anchor="middle" font-family="monospace" font-size="8" fill="#ff6b6b">🔴 S4 = Single Point of Failure</text>

  <!-- Arrow -->
  <line x1="270" y1="140" x2="310" y2="140" stroke="#fbbf24" stroke-width="2" filter="url(#g)"/>
  <polygon points="308,135 318,140 308,145" fill="#fbbf24"/>

  <!-- GNN Processing (center) -->
  <g filter="url(#s)">
    <rect x="320" y="55" width="160" height="190" rx="8" fill="#1e1a3a" stroke="#c084fc" stroke-width="1.2"/>
    <text x="400" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#c084fc">GraphSAGE</text>
    <rect x="338" y="90" width="124" height="22" rx="4" fill="#2a1f5e"/>
    <text x="400" y="105" text-anchor="middle" font-family="monospace" font-size="8" fill="#d4b8ff">1. Neighbor Sample</text>
    <rect x="338" y="118" width="124" height="22" rx="4" fill="#2a1f5e"/>
    <text x="400" y="133" text-anchor="middle" font-family="monospace" font-size="8" fill="#d4b8ff">2. Aggregate (MEAN)</text>
    <rect x="338" y="146" width="124" height="22" rx="4" fill="#2a1f5e"/>
    <text x="400" y="161" text-anchor="middle" font-family="monospace" font-size="8" fill="#d4b8ff">3. Concat + Dense</text>
    <rect x="338" y="174" width="124" height="22" rx="4" fill="#2a1f5e"/>
    <text x="400" y="189" text-anchor="middle" font-family="monospace" font-size="8" fill="#d4b8ff">4. Normalize</text>
    <rect x="338" y="202" width="124" height="22" rx="4" fill="#1a3a2a" stroke="#00ff88" stroke-width="0.5"/>
    <text x="400" y="217" text-anchor="middle" font-family="monospace" font-size="8" fill="#00ff88">Node Embeddings</text>
  </g>

  <!-- Arrow -->
  <line x1="480" y1="140" x2="520" y2="140" stroke="#fbbf24" stroke-width="2" filter="url(#g)"/>
  <polygon points="518,135 528,140 518,145" fill="#fbbf24"/>

  <!-- Output (right) -->
  <g filter="url(#s)">
    <rect x="530" y="55" width="155" height="190" rx="8" fill="#162040" stroke="#00ff88" stroke-width="1.2"/>
    <text x="607" y="78" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="700" fill="#00ff88">Analyse</text>
    <text x="555" y="100" font-family="monospace" font-size="9" fill="#4ade80">✅ Resilienz-Score</text>
    <text x="555" y="120" font-family="monospace" font-size="9" fill="#fbbf24">⚡ SPOF-Erkennung</text>
    <text x="555" y="140" font-family="monospace" font-size="9" fill="#ff6b6b">🔴 Kritische Pfade</text>
    <text x="555" y="160" font-family="monospace" font-size="9" fill="#00d4ff">📊 Betweenness</text>
    <text x="555" y="180" font-family="monospace" font-size="9" fill="#c084fc">🔮 Ausfallrisiko</text>
    <text x="555" y="200" font-family="monospace" font-size="9" fill="#8892b0">🛡️ Empfehlungen</text>
    <line x1="545" y1="210" x2="670" y2="210" stroke="#3b4563" stroke-width="0.5"/>
    <text x="607" y="232" text-anchor="middle" font-family="monospace" font-size="8" fill="#5a6080">Embedding: 64-dim</text>
  </g>
</svg>
