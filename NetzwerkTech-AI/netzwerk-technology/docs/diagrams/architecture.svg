<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0a0e1a"/><stop offset="100%" style="stop-color:#151d30"/>
    </linearGradient>
    <filter id="s"><feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#000" flood-opacity="0.4"/></filter>
  </defs>
  <rect width="800" height="450" fill="url(#bg)" rx="12"/>
  <text x="400" y="30" text-anchor="middle" font-family="sans-serif" font-size="16" font-weight="700" fill="#e2e8f0">Microservice-Architektur</text>
  
  <!-- Layer 1: Frontend -->
  <g filter="url(#s)">
    <rect x="200" y="45" width="400" height="50" rx="8" fill="#1a2744" stroke="#00d4ff" stroke-width="1.2"/>
    <text x="400" y="75" text-anchor="middle" font-family="sans-serif" font-size="13" font-weight="600" fill="#00d4ff">🖥️ Web Dashboard — React + D3.js + WebSocket</text>
  </g>

  <!-- Layer 2: API Gateway -->
  <g filter="url(#s)">
    <rect x="200" y="110" width="400" height="45" rx="8" fill="#1a2744" stroke="#7b2ff7" stroke-width="1.2"/>
    <text x="400" y="138" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#c084fc">🔌 API Gateway — FastAPI + GraphQL + gRPC</text>
  </g>

  <!-- Layer 3: AI Microservices -->
  <g filter="url(#s)">
    <rect x="30" y="175" width="140" height="65" rx="6" fill="#1e1a3a" stroke="#a78bfa" stroke-width="1"/>
    <text x="100" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#a78bfa">🔍 Anomaly</text>
    <text x="100" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">LSTM+AE</text>
    <text x="100" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">Port: 8001</text>
  </g>
  <g filter="url(#s)">
    <rect x="185" y="175" width="140" height="65" rx="6" fill="#1e1a3a" stroke="#a78bfa" stroke-width="1"/>
    <text x="255" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#a78bfa">📊 Traffic</text>
    <text x="255" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">CNN+Attention</text>
    <text x="255" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">Port: 8002</text>
  </g>
  <g filter="url(#s)">
    <rect x="340" y="175" width="140" height="65" rx="6" fill="#1e1a3a" stroke="#a78bfa" stroke-width="1"/>
    <text x="410" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#a78bfa">🛡️ IDS</text>
    <text x="410" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Transformer</text>
    <text x="410" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">Port: 8003</text>
  </g>
  <g filter="url(#s)">
    <rect x="495" y="175" width="140" height="65" rx="6" fill="#1e1a3a" stroke="#a78bfa" stroke-width="1"/>
    <text x="565" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#a78bfa">🔮 Predict</text>
    <text x="565" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">GRU+Bayesian</text>
    <text x="565" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">Port: 8004</text>
  </g>
  <g filter="url(#s)">
    <rect x="650" y="175" width="140" height="65" rx="6" fill="#1a3a2a" stroke="#00ff88" stroke-width="1"/>
    <text x="720" y="200" text-anchor="middle" font-family="sans-serif" font-size="10" font-weight="600" fill="#00ff88">🌐 Topology</text>
    <text x="720" y="215" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">GraphSAGE</text>
    <text x="720" y="230" text-anchor="middle" font-family="monospace" font-size="8" fill="#4b5563">Port: 8005</text>
  </g>

  <!-- Layer 4: Message Queue -->
  <g filter="url(#s)">
    <rect x="100" y="265" width="600" height="40" rx="8" fill="#2a2a1a" stroke="#fbbf24" stroke-width="1.2"/>
    <text x="400" y="290" text-anchor="middle" font-family="sans-serif" font-size="12" font-weight="600" fill="#fbbf24">📨 Apache Kafka — Event Streaming Platform</text>
  </g>

  <!-- Layer 5: Data -->
  <g filter="url(#s)">
    <rect x="60" y="330" width="180" height="55" rx="6" fill="#1a2a2a" stroke="#22d3ee" stroke-width="1"/>
    <text x="150" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#22d3ee">🗄️ TimescaleDB</text>
    <text x="150" y="373" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Time-series Data</text>
  </g>
  <g filter="url(#s)">
    <rect x="280" y="330" width="180" height="55" rx="6" fill="#2a1a1a" stroke="#f87171" stroke-width="1"/>
    <text x="370" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#f87171">⚡ Redis</text>
    <text x="370" y="373" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Cache + Sessions</text>
  </g>
  <g filter="url(#s)">
    <rect x="500" y="330" width="180" height="55" rx="6" fill="#1a1a2a" stroke="#818cf8" stroke-width="1"/>
    <text x="590" y="355" text-anchor="middle" font-family="sans-serif" font-size="11" font-weight="600" fill="#818cf8">☁️ MinIO / S3</text>
    <text x="590" y="373" text-anchor="middle" font-family="monospace" font-size="9" fill="#6b7280">Models + Artifacts</text>
  </g>

  <!-- Connectors -->
  <g stroke="#3b4563" stroke-width="1" stroke-dasharray="3,2" opacity="0.6">
    <line x1="400" y1="95" x2="400" y2="110"/>
    <line x1="400" y1="155" x2="100" y2="175"/><line x1="400" y1="155" x2="255" y2="175"/>
    <line x1="400" y1="155" x2="410" y2="175"/><line x1="400" y1="155" x2="565" y2="175"/>
    <line x1="400" y1="155" x2="720" y2="175"/>
    <line x1="400" y1="240" x2="400" y2="265"/>
    <line x1="400" y1="305" x2="150" y2="330"/><line x1="400" y1="305" x2="370" y2="330"/>
    <line x1="400" y1="305" x2="590" y2="330"/>
  </g>

  <!-- Docker badge -->
  <rect x="10" y="415" width="120" height="25" rx="4" fill="#1a2744" stroke="#2496ed" stroke-width="0.8"/>
  <text x="70" y="432" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#2496ed">🐳 Docker Compose</text>
  <rect x="140" y="415" width="120" height="25" rx="4" fill="#1a2744" stroke="#326ce5" stroke-width="0.8"/>
  <text x="200" y="432" text-anchor="middle" font-family="sans-serif" font-size="9" fill="#326ce5">☸️ Kubernetes</text>
</svg>
