    <circle cx="30" cy="-30" r="5" fill="#1a2a1a" stroke="#00ff88" stroke-width="1.5"/>
    <circle cx="-30" cy="30" r="5" fill="#1a2a1a" stroke="#00ff88" stroke-width="1.5"/>
