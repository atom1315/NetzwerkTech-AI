    <circle cx="0" cy="0" r="6" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
    <circle cx="-35" cy="30" r="5" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
    <circle cx="35" cy="30" r="5" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1.5"/>
