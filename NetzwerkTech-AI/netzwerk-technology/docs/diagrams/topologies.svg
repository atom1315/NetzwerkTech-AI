    <circle cx="-25" cy="-25" r="4" fill="#1e3a5f" stroke="#00d4ff" stroke-width="1"/>
    <circle cx="25" cy="-25" r="4" fill="#1a2a1a" stroke="#00ff88" stroke-width="1"/>
    <circle cx="-25" cy="25" r="4" fill="#2a1a1a" stroke="#ff6b6b" stroke-width="1"/>
    <circle cx="25" cy="25" r="4" fill="#2a2a1a" stroke="#fbbf24" stroke-width="1"/>
    <line x1="0" y1="0" x2="-25" y2="-25" stroke="#e2e8f0" stroke-width="0.7" opacity="0.5"/>
    <line x1="0" y1="0" x2="25" y2="-25" stroke="#e2e8f0" stroke-width="0.7" opacity="0.5"/>
