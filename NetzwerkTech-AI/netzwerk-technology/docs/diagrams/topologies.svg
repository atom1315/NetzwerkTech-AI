    <line x1="30" y1="-30" x2="30" y2="30" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
    <line x1="-30" y1="30" x2="30" y2="30" stroke="#00ff88" stroke-width="0.8" opacity="0.5"/>
